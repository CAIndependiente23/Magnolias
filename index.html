<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#fff;
color:#222;
}

header{
padding:50px 20px;
text-align:center;
border-bottom:1px solid #eee;
}

header h1{
font-size:40px;
font-weight:500;
letter-spacing:4px;
margin-bottom:10px;
}

header p{
color:#666;
font-size:15px;
}

.catalogo{

max-width:1300px;
margin:auto;
padding:60px 30px;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:45px;

}

.producto{

transition:.35s;

}

.producto:hover{

transform:translateY(-6px);

}

.producto img{

width:100%;
height:460px;
object-fit:cover;

}

.info{

padding:22px 5px;

}

.nombre{

font-size:22px;
font-weight:500;
margin-bottom:12px;

}

.precio{

font-size:18px;
font-weight:600;
margin-bottom:25px;

}

button{

padding:14px 28px;
background:#111;
color:white;
border:none;
cursor:pointer;
font-size:14px;
letter-spacing:1px;
transition:.3s;

}

button:hover{

background:#444;

}

footer{

margin-top:80px;
padding:40px;
text-align:center;
color:#777;
border-top:1px solid #eee;

}

</style>

</head>

<body>

<header>

<h1>CATÁLOGO</h1>

<p>Carteras</p>

</header>

<section class="catalogo">

<div class="producto">

<img src="C1.jpeg" alt="Cartera 1">

<div class="info">

<div class="nombre">1</div>

<div class="precio">$1,00</div>

<button>Ver producto</button>

</div>

</div>

<div class="producto">

<img src="C2.jpeg" alt="Cartera 2">

<div class="info">

<div class="nombre">2</div>

<div class="precio">$1,00</div>

<button>Ver producto</button>

</div>

</div>

<div class="producto">

<img src="C3.jpeg" alt="Cartera 3">

<div class="info">

<div class="nombre">3</div>

<div class="precio">$1,00</div>

<button>Ver producto</button>

</div>

</div>

</section>

<footer>

© 2025 Catálogo de Carteras

</footer>

</body>
</html>
