<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Carteras</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{
background:#fafafa;
color:#222;
}

header{
background:white;
padding:50px 20px;
text-align:center;
border-bottom:1px solid #ddd;
}

header h1{
font-size:42px;
letter-spacing:4px;
font-weight:500;
}

header p{
margin-top:10px;
color:#777;
}

.catalogo{
max-width:1300px;
margin:auto;
padding:60px 30px;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
gap:45px;
}

.producto{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.3s;
}

.producto:hover{
transform:translateY(-8px);
}

.producto img{
width:100%;
height:470px;
object-fit:cover;
}

.info{
padding:25px;
}

.nombre{
font-size:24px;
margin-bottom:12px;
}

.precio{
font-size:20px;
font-weight:600;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
cursor:pointer;
margin-top:10px;
font-size:15px;
border-radius:5px;
transition:.3s;
}

.calcular{
background:#444;
color:white;
}

.calcular:hover{
background:#222;
}

.whatsapp{
background:#25D366;
color:white;
}

.whatsapp:hover{
background:#128C7E;
}

.resultado{
margin-top:15px;
font-weight:600;
color:#444;
min-height:45px;
}

footer{
margin-top:70px;
padding:35px;
text-align:center;
color:#777;
border-top:1px solid #ddd;
background:white;
}

</style>

</head>

<body>

<header>

<h1>CATÁLOGO</h1>

<p>Carteras de cuero</p>

</header>

<section class="catalogo">

<div class="producto">

<img src="C1.jpeg">

<div class="info">

<div class="nombre">1</div>

<div class="precio">$1,00</div>

<input id="cp1" type="text" placeholder="Ingresá tu código postal">

<button class="calcular" onclick="calcular(1)">Calcular envío</button>

<div class="resultado" id="resultado1"></div>

<button class="whatsapp" onclick="comprar(1)">Comprar por WhatsApp</button>

</div>

</div>

<div class="producto">

<img src="C2.jpeg">

<div class="info">

<div class="nombre">2</div>

<div class="precio">$1,00</div>

<input id="cp2" type="text" placeholder="Ingresá tu código postal">

<button class="calcular" onclick="calcular(2)">Calcular envío</button>

<div class="resultado" id="resultado2"></div>

<button class="whatsapp" onclick="comprar(2)">Comprar por WhatsApp</button>

</div>

</div>

<div class="producto">

<img src="C3.jpeg">

<div class="info">

<div class="nombre">3</div>

<div class="precio">$1,00</div>

<input id="cp3" type="text" placeholder="Ingresá tu código postal">

<button class="calcular" onclick="calcular(3)">Calcular envío</button>

<div class="resultado" id="resultado3"></div>

<button class="whatsapp" onclick="comprar(3)">Comprar por WhatsApp</button>

</div>

</div>

<div class="producto">

<img src="C3.jpeg">

<div class="info">

<div class="nombre">3</div>

<div class="precio">$1,00</div>

<input id="cp3" type="text" placeholder="Ingresá tu código postal">

<button class="calcular" onclick="calcular(3)">Calcular envío</button>

<div class="resultado" id="resultado3"></div>

<button class="whatsapp" onclick="comprar(3)">Comprar por WhatsApp</button>

</div>

</div>

</section>

<footer>

© 2026 - Catálogo de Carteras

</footer>

<script>

function calcular(id){

let cp=document.getElementById("cp"+id).value;

if(cp==""){

alert("Ingresá un código postal.");

return;

}

/*
AQUÍ MÁS ADELANTE PODEMOS CONECTAR LA API DE CORREO ARGENTINO
*/

let envio=5500;

document.getElementById("resultado"+id).innerHTML=
"📦 Envío estimado: $" + envio.toLocaleString("es-AR") +
"<br>Tiempo estimado: 3 a 5 días hábiles";

}

function comprar(id){

let cp=document.getElementById("cp"+id).value;

let mensaje="Hola! Quiero comprar la Cartera "+id+
". Mi código postal es: "+cp;

window.open("https://wa.me/5491111111111?text="+encodeURIComponent(mensaje));

}

</script>

</body>
</html>
