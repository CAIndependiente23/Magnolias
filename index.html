<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Magnolias Shop</title>

    <meta name="description" content="Magnolias - Carteras y accesorios">

    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/catalogo.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">

    <div class="logo">

        MAGNOLIAS

    </div>

    <nav>

        <a href="#">Inicio</a>
        <a href="#">Colección</a>
        <a href="#">Contacto</a>

    </nav>

    <div class="acciones">

        <input
            id="buscador"
            type="text"
            placeholder="Buscar productos..."
        >

        <button id="btnCarrito">

            🛒
            <span id="cantidadCarrito">0</span>

        </button>

    </div>

</header>

<section class="hero">

    <div class="heroContenido">

        <h1>Nueva Colección</h1>

        <p>

            Carteras elegantes para cada ocasión.

        </p>

        <button>

            Ver Colección

        </button>

    </div>

</section>

<main>

    <section class="contenedor">

        <h2>

            Productos

        </h2>

        <div id="catalogo" class="catalogo">

        </div>

    </section>

</main>

<footer>

    <div>

        © 2026 MAGNOLIAS

    </div>

</footer>

<script src="js/productos.js"></script>
<script src="js/app.js"></script>

</body>

</html>
